<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Competitive Intelligence Agent</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ── Reset & Base ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:              #080a13;
      --bg-panel:             #0c0f1e;
      --bg-card:              #101427;
      --bg-card-hover:        #141830;
      --bg-input:             #090c1a;
      --border-subtle:        rgba(255,255,255,0.05);
      --border-default:       rgba(255,255,255,0.09);
      --border-strong:        rgba(255,255,255,0.16);
      --accent:               #7c6dff;
      --accent-dim:           rgba(124,109,255,0.65);
      --accent-glow:          rgba(124,109,255,0.10);
      --accent-glow-strong:   rgba(124,109,255,0.22);
      --success:              #34d399;
      --success-dim:          rgba(52,211,153,0.70);
      --success-glow:         rgba(52,211,153,0.08);
      --success-glow-strong:  rgba(52,211,153,0.18);
      --danger:               #f87171;
      --warn:                 #fbbf24;
      --text-primary:         #eeeef8;
      --text-secondary:       #7e7ea8;
      --text-muted:           #3c3c5a;
      --r-xs: 4px;  --r-sm: 6px;  --r-md: 10px;  --r-lg: 14px;
      --ease: cubic-bezier(0.4,0,0.2,1);
    }

    html, body, #root { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .app { display:flex; flex-direction:column; height:100%; overflow:hidden; }
    .workspace { display:flex; flex:1; overflow:hidden; min-height:0; }

    /* ── Header ──────────────────────────────────────────────────────────── */
    .header {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 24px; height:52px; flex-shrink:0; position:relative; z-index:10;
      background: linear-gradient(180deg,rgba(124,109,255,.04) 0%,transparent 100%), var(--bg-panel);
      border-bottom: 1px solid var(--border-subtle);
    }
    .header-brand { display:flex; align-items:center; gap:10px; }
    .header-icon {
      width:30px; height:30px; border-radius:var(--r-sm);
      background:var(--accent-glow-strong); border:1px solid rgba(124,109,255,.25);
      display:flex; align-items:center; justify-content:center; color:var(--accent);
    }
    .header-title { font-size:14px; font-weight:600; letter-spacing:-.01em; }
    .header-badge {
      font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.09em;
      background:var(--accent-glow-strong); color:var(--accent);
      border:1px solid rgba(124,109,255,.28); padding:2px 7px; border-radius:99px;
    }
    .header-meta { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--text-secondary); }
    .status-dot {
      width:7px; height:7px; background:var(--success); border-radius:50%;
      box-shadow:0 0 8px var(--success); animation:pulse-dot 2.5s ease-in-out infinite;
    }

    /* ── Left Panel ──────────────────────────────────────────────────────── */
    .left-panel {
      width:348px; flex-shrink:0; background:var(--bg-panel);
      border-right:1px solid var(--border-subtle);
      display:flex; flex-direction:column; overflow-y:auto; padding:22px 20px;
    }
    .section-divider { height:1px; background:var(--border-subtle); margin:22px 0; flex-shrink:0; }

    /* ── Right Panel ─────────────────────────────────────────────────────── */
    .right-panel { flex:1; overflow-y:auto; background:var(--bg-base); min-width:0; }

    /* ── Input Form ──────────────────────────────────────────────────────── */
    .input-form { display:flex; flex-direction:column; gap:16px; flex-shrink:0; }
    .form-title { font-size:14px; font-weight:700; letter-spacing:-.01em; margin-bottom:2px; }
    .form-subtitle { font-size:12px; color:var(--text-secondary); }
    .form-fields { display:flex; flex-direction:column; gap:11px; }
    .field { display:flex; flex-direction:column; gap:5px; }
    .field-label {
      font-size:11.5px; font-weight:600; color:var(--text-secondary);
      display:flex; align-items:center; gap:5px; letter-spacing:.01em;
    }
    .required { color:var(--danger); }
    .optional {
      font-weight:400; font-size:10.5px; color:var(--text-muted);
      background:rgba(255,255,255,.04); border:1px solid var(--border-subtle);
      padding:1px 5px; border-radius:var(--r-xs);
    }
    .field-input, .field-textarea {
      background:var(--bg-input); border:1px solid var(--border-default);
      border-radius:var(--r-sm); padding:9px 12px; color:var(--text-primary);
      font-size:13px; font-family:inherit; line-height:1.5; resize:none; width:100%;
      transition:border-color 150ms var(--ease), box-shadow 150ms var(--ease);
    }
    .field-input::placeholder, .field-textarea::placeholder { color:var(--text-muted); }
    .field-input:focus, .field-textarea:focus {
      outline:none; border-color:rgba(124,109,255,.5); box-shadow:0 0 0 3px var(--accent-glow);
    }
    .field-input:disabled, .field-textarea:disabled { opacity:.45; cursor:not-allowed; }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:7px;
      padding:9px 16px; border-radius:var(--r-sm); font-size:13px; font-weight:600;
      font-family:inherit; cursor:pointer; border:none; width:100%;
      transition:all 150ms var(--ease); letter-spacing:-.01em;
    }
    .btn-primary {
      background:linear-gradient(135deg,#7c6dff 0%,#5243cc 100%); color:#fff;
      box-shadow:0 1px 3px rgba(0,0,0,.4),0 4px 16px rgba(124,109,255,.28);
    }
    .btn-primary:hover:not(:disabled) {
      background:linear-gradient(135deg,#9080ff 0%,#6454dd 100%);
      box-shadow:0 1px 3px rgba(0,0,0,.4),0 6px 24px rgba(124,109,255,.42);
      transform:translateY(-1px);
    }
    .btn-primary:disabled { opacity:.45; cursor:not-allowed; transform:none; box-shadow:none; }
    .btn-loading { background:linear-gradient(135deg,#4a3db0 0%,#3a2ea0 100%) !important; cursor:not-allowed; }
    .btn-spinner {
      width:12px; height:12px; border:2px solid rgba(255,255,255,.28);
      border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0;
    }
    .btn-reset {
      background:var(--bg-card); color:var(--text-secondary); border:1px solid var(--border-default);
    }
    .btn-reset:hover { background:var(--bg-card-hover); color:var(--text-primary); border-color:var(--border-strong); }

    /* ── Progress Tracker ────────────────────────────────────────────────── */
    .progress-tracker { display:flex; flex-direction:column; gap:14px; flex-shrink:0; }
    .tracker-header { display:flex; justify-content:space-between; align-items:center; }
    .tracker-label {
      font-size:10.5px; font-weight:700; color:var(--text-secondary);
      text-transform:uppercase; letter-spacing:.08em;
    }
    .tracker-count {
      font-size:11px; font-weight:700; color:var(--text-muted);
      font-variant-numeric:tabular-nums; transition:color 300ms var(--ease);
    }
    .tracker-count.all-done { color:var(--success-dim); }
    .tracker-steps { display:flex; flex-direction:column; }

    .step-item { display:flex; gap:11px; }
    .step-left { display:flex; flex-direction:column; align-items:center; flex-shrink:0; width:34px; }
    .step-circle {
      width:34px; height:34px; border-radius:50%; display:flex; align-items:center;
      justify-content:center; position:relative; flex-shrink:0; z-index:1;
      transition:background 300ms var(--ease),border-color 300ms var(--ease),box-shadow 300ms var(--ease);
    }
    .step-number { font-size:11.5px; font-weight:700; font-variant-numeric:tabular-nums; line-height:1; }
    .step-connector {
      width:2px; flex:1; min-height:14px; border-radius:1px; margin:3px 0;
      transition:background 400ms var(--ease);
    }
    .step-content { padding-top:6px; padding-bottom:18px; min-width:0; }
    .step-label { font-size:12.5px; font-weight:600; line-height:1.3; transition:color 250ms var(--ease); }
    .step-desc  { font-size:11px; margin-top:2px; line-height:1.45; transition:color 250ms var(--ease); }

    .step-idle .step-circle   { background:rgba(255,255,255,.03); border:1.5px solid var(--border-default); color:var(--text-muted); }
    .step-idle .step-connector { background:var(--border-subtle); }
    .step-idle .step-label    { color:var(--text-secondary); }
    .step-idle .step-desc     { color:var(--text-muted); }

    .step-active .step-circle  { background:var(--accent-glow-strong); border:1.5px solid rgba(124,109,255,.55); color:var(--accent); box-shadow:0 0 0 4px var(--accent-glow); }
    .step-active .step-connector { background:var(--border-subtle); }
    .step-active .step-label   { color:var(--text-primary); }
    .step-active .step-desc    { color:var(--text-secondary); }

    .step-complete .step-circle  { background:var(--success-glow-strong); border:1.5px solid rgba(52,211,153,.5); color:var(--success); box-shadow:0 0 0 3px var(--success-glow); }
    .step-complete .step-connector { background:var(--success-dim); }
    .step-complete .step-label   { color:var(--text-secondary); }
    .step-complete .step-desc    { color:var(--text-muted); }

    .step-spinner {
      position:absolute; width:16px; height:16px;
      border:2px solid rgba(124,109,255,.25); border-top-color:var(--accent);
      border-radius:50%; animation:spin .85s linear infinite;
    }
    .step-pulse-ring {
      position:absolute; inset:-5px; border-radius:50%;
      border:1.5px solid var(--accent); opacity:0; pointer-events:none;
      animation:pulse-ring 1.8s ease-out infinite;
    }

    /* ── Output Panel ────────────────────────────────────────────────────── */
    .output-panel { min-height:100%; }

    .output-idle { display:flex; align-items:center; justify-content:center; min-height:100%; padding:40px; }
    .idle-inner  { display:flex; flex-direction:column; align-items:center; text-align:center; max-width:340px; gap:14px; }
    .idle-icon-wrap {
      width:76px; height:76px; border-radius:50%; background:var(--accent-glow);
      border:1px solid rgba(124,109,255,.14); display:flex; align-items:center;
      justify-content:center; color:var(--accent-dim); margin-bottom:4px;
    }
    .idle-title  { font-size:18px; font-weight:700; letter-spacing:-.02em; }
    .idle-body   { font-size:13px; color:var(--text-secondary); line-height:1.65; }
    .idle-chips  { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
    .idle-chip   {
      display:flex; align-items:center; gap:5px; font-size:11.5px; color:var(--text-muted);
      background:rgba(255,255,255,.03); border:1px solid var(--border-subtle);
      padding:4px 10px; border-radius:99px;
    }
    .idle-chip-dot { width:5px; height:5px; background:var(--accent-dim); border-radius:50%; flex-shrink:0; }

    .output-running { padding:30px 36px; }
    .running-eyebrow { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--accent-dim); margin-bottom:6px; }
    .running-company { font-size:26px; font-weight:800; color:var(--text-primary); letter-spacing:-.025em; margin-bottom:10px; }
    .running-status-row { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-secondary); margin-bottom:28px; }
    .running-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; animation:pulse 1.4s ease-in-out infinite; flex-shrink:0; }
    .skeleton-stack { display:flex; flex-direction:column; gap:14px; }
    .skeleton-card {
      background:var(--bg-card); border:1px solid var(--border-subtle);
      border-radius:var(--r-lg); padding:18px 20px; display:flex; flex-direction:column; gap:9px;
    }
    .skel {
      height:9px; border-radius:4px;
      background:linear-gradient(90deg,var(--bg-input) 0%,rgba(255,255,255,.07) 50%,var(--bg-input) 100%);
      background-size:200% 100%; animation:shimmer 1.7s ease-in-out infinite;
    }
    .skel-w70{width:70%;} .skel-w50{width:50%;} .skel-w35{width:35%;}

    /* Done / Report */
    .output-done { display:flex; flex-direction:column; }
    .report-header {
      padding:26px 36px 22px; border-bottom:1px solid var(--border-subtle);
      background:linear-gradient(180deg,rgba(124,109,255,.04) 0%,transparent 80%);
      animation:fadeIn .4s var(--ease) both;
    }
    .report-title-row { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; }
    .report-eyebrow { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:var(--accent-dim); margin-bottom:5px; }
    .report-company { font-size:26px; font-weight:800; letter-spacing:-.025em; }
    .report-meta-col { display:flex; flex-direction:column; align-items:flex-end; gap:7px; }
    .report-badge {
      font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.07em;
      background:var(--success-glow-strong); color:var(--success);
      border:1px solid rgba(52,211,153,.28); padding:2px 9px; border-radius:99px;
    }
    .report-date { font-size:11px; color:var(--text-muted); }
    .report-stats { display:flex; gap:28px; }
    .stat { display:flex; flex-direction:column; gap:1px; }
    .stat-value { font-size:22px; font-weight:800; letter-spacing:-.03em; font-variant-numeric:tabular-nums; line-height:1.1; }
    .stat-label { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; font-weight:600; }
    .report-body { padding:28px 36px; display:flex; flex-direction:column; gap:34px; }
    .report-section-title { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:var(--text-secondary); margin-bottom:14px; }

    .competitors-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(158px,1fr)); gap:10px; }
    .competitor-card {
      background:var(--bg-card); border:1px solid var(--border-subtle);
      border-radius:var(--r-lg); padding:14px; cursor:default;
      transition:background 150ms var(--ease),border-color 150ms var(--ease);
      animation:fadeInUp 400ms var(--ease) both;
    }
    .competitor-card:hover { background:var(--bg-card-hover); border-color:var(--border-default); }
    .cc-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
    .cc-avatar {
      width:36px; height:36px; border-radius:var(--r-sm);
      background:var(--accent-glow); border:1px solid rgba(124,109,255,.15);
      display:flex; align-items:center; justify-content:center;
      font-size:15px; font-weight:800; color:var(--accent-dim);
    }
    .cc-threat { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; padding:2px 7px; border-radius:99px; }
    .threat-high   { background:rgba(248,113,113,.12); color:var(--danger); border:1px solid rgba(248,113,113,.22); }
    .threat-medium { background:rgba(251,191,36,.10);  color:var(--warn);   border:1px solid rgba(251,191,36,.22); }
    .threat-low    { background:var(--success-glow);   color:var(--success); border:1px solid rgba(52,211,153,.22); }
    .cc-name    { font-size:13px; font-weight:700; margin-bottom:2px; }
    .cc-founded { font-size:11px; color:var(--text-muted); margin-bottom:9px; }
    .cc-tags    { display:flex; flex-wrap:wrap; gap:4px; }
    .cc-tag     { font-size:9.5px; font-weight:600; background:rgba(255,255,255,.04); border:1px solid var(--border-subtle); color:var(--text-secondary); padding:2px 6px; border-radius:var(--r-xs); }

    .insights-list { display:flex; flex-direction:column; gap:8px; }
    .insight-item {
      display:flex; align-items:flex-start; gap:11px; background:var(--bg-card);
      border:1px solid var(--border-subtle); border-radius:var(--r-md); padding:12px 15px;
      transition:background 150ms var(--ease),border-color 150ms var(--ease);
      animation:fadeInUp 400ms var(--ease) both; cursor:default;
    }
    .insight-item:hover { background:var(--bg-card-hover); border-color:var(--border-default); }
    .insight-bullet { width:6px; height:6px; background:var(--accent-dim); border-radius:50%; flex-shrink:0; margin-top:7px; }
    .insight-text   { font-size:12.5px; color:var(--text-secondary); line-height:1.65; }

    .recs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; }
    .rec-card {
      background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:var(--r-lg);
      padding:16px; animation:fadeInUp 400ms var(--ease) both; cursor:default;
      transition:background 150ms var(--ease),border-color 150ms var(--ease);
    }
    .rec-card:hover { background:var(--bg-card-hover); border-color:var(--border-default); }
    .rec-number { font-size:10px; font-weight:800; color:var(--accent-dim); margin-bottom:9px; font-variant-numeric:tabular-nums; letter-spacing:.04em; }
    .rec-title  { font-size:13px; font-weight:700; margin-bottom:6px; line-height:1.35; }
    .rec-body   { font-size:12px; color:var(--text-secondary); line-height:1.65; }

    /* ── Animations ──────────────────────────────────────────────────────── */
    @keyframes spin       { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes pulse-ring { 0%{transform:scale(.9);opacity:.65} 100%{transform:scale(1.65);opacity:0} }
    @keyframes pulse      { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.45;transform:scale(.75)} }
    @keyframes pulse-dot  { 0%,100%{opacity:1;box-shadow:0 0 8px var(--success)} 50%{opacity:.6;box-shadow:0 0 4px var(--success)} }
    @keyframes shimmer    { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    @keyframes fadeIn     { from{opacity:0} to{opacity:1} }
    @keyframes fadeInUp   { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef } = React;

    /* ── Constants ────────────────────────────────────────────────────────── */
    const STEPS = [
      { id:0, label:'Problem Framing',     desc:'Defining scope and research objectives',              ms:2400 },
      { id:1, label:'Competitor Discovery',desc:'Identifying relevant market players',                 ms:3000 },
      { id:2, label:'Data Collection',     desc:'Gathering market and product intelligence',           ms:3800 },
      { id:3, label:'Comparative Analysis',desc:'Evaluating strengths and market positioning',         ms:3200 },
      { id:4, label:'Synthesis',           desc:'Generating insights and strategic recommendations',   ms:2600 },
    ];

    const MOCK_COMPETITORS = [
      { name:'Apex Analytics', tags:['Enterprise','AI-Native'],  threat:'High',   founded:'2019' },
      { name:'DataVault Pro',  tags:['SMB','Cloud-First'],       threat:'Medium', founded:'2021' },
      { name:'NexusAI',        tags:['Enterprise','ML-Focused'], threat:'High',   founded:'2018' },
      { name:'Stratify',       tags:['Mid-Market'],              threat:'Medium', founded:'2020' },
      { name:'Horizon Labs',   tags:['Niche','Startup'],         threat:'Low',    founded:'2022' },
    ];

    const MOCK_INSIGHTS = [
      'Leading competitors are prioritizing AI-native workflows, with 73% of product updates in Q3 2025 focused on automation and intelligent assistants.',
      'Pricing pressure from new entrants is intensifying in the SMB segment, with average contract values declining 12% year-over-year.',
      'The market is consolidating around 2–3 dominant platforms, while specialized players carve out defensible vertical niches.',
      'Enterprise buyers show 40% longer sales cycles but 3× higher lifetime value compared to SMB customers — a critical segmentation signal.',
    ];

    const MOCK_RECS = [
      { title:'Double Down on Integration Depth',  body:'Competitors lack robust API ecosystems. Prioritize developer experience and third-party connectors to create switching costs.' },
      { title:'Target the Mid-Market Gap',         body:'A significant whitespace exists between lightweight SMB tools and complex enterprise platforms. Position squarely in this segment.' },
      { title:'Accelerate AI Roadmap',             body:'Market leaders ship AI features quarterly. Matching velocity is table stakes — differentiate on accuracy, explainability, and trust.' },
    ];

    /* ── App ──────────────────────────────────────────────────────────────── */
    function App() {
      const [company,          setCompany]          = useState('');
      const [context,          setContext]           = useState('');
      const [phase,            setPhase]             = useState('idle');
      const [stepStates,       setStepStates]        = useState(() => STEPS.map(() => 'idle'));
      const [analysedCompany,  setAnalysedCompany]   = useState('');
      const timersRef = useRef([]);

      const runAnalysis = () => {
        const name = company.trim();
        if (!name) return;
        timersRef.current.forEach(clearTimeout);
        timersRef.current = [];
        setAnalysedCompany(name);
        setPhase('running');
        setStepStates(STEPS.map(() => 'idle'));

        let delay = 0;
        STEPS.forEach((step, i) => {
          const tOn = setTimeout(() => {
            setStepStates(prev => prev.map((s, j) => j === i ? 'active' : s));
          }, delay);
          timersRef.current.push(tOn);
          delay += step.ms;
          const tOff = setTimeout(() => {
            setStepStates(prev => prev.map((s, j) => j === i ? 'complete' : s));
          }, delay);
          timersRef.current.push(tOff);
        });

        const total = STEPS.reduce((a, s) => a + s.ms, 0);
        const tDone = setTimeout(() => setPhase('done'), total + 80);
        timersRef.current.push(tDone);
      };

      const reset = () => {
        timersRef.current.forEach(clearTimeout);
        timersRef.current = [];
        setPhase('idle');
        setStepStates(STEPS.map(() => 'idle'));
        setCompany('');
        setContext('');
        setAnalysedCompany('');
      };

      const activeStep = STEPS[stepStates.indexOf('active')] ?? null;

      return (
        <div className="app">
          <AppHeader />
          <div className="workspace">
            <aside className="left-panel">
              <InputForm
                company={company} context={context}
                setCompany={setCompany} setContext={setContext}
                onSubmit={runAnalysis} onReset={reset} phase={phase}
              />
              <div className="section-divider" />
              <ProgressTracker steps={STEPS} stepStates={stepStates} />
            </aside>
            <main className="right-panel">
              <OutputPanel phase={phase} company={analysedCompany} activeStep={activeStep} />
            </main>
          </div>
        </div>
      );
    }

    /* ── Header ───────────────────────────────────────────────────────────── */
    function AppHeader() {
      return (
        <header className="header">
          <div className="header-brand">
            <div className="header-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
            </div>
            <span className="header-title">Competitive Intelligence</span>
            <span className="header-badge">Agent</span>
          </div>
          <div className="header-meta">
            <span className="status-dot" />
            <span>Research Mode</span>
          </div>
        </header>
      );
    }

    /* ── Input Form ───────────────────────────────────────────────────────── */
    function InputForm({ company, context, setCompany, setContext, onSubmit, onReset, phase }) {
      const isRunning = phase === 'running';
      const isDone    = phase === 'done';
      return (
        <div className="input-form">
          <div>
            <h2 className="form-title">Research Target</h2>
            <p className="form-subtitle">Configure your competitive analysis</p>
          </div>
          <div className="form-fields">
            <div className="field">
              <label className="field-label">Company Name <span className="required">*</span></label>
              <input
                className="field-input" type="text"
                placeholder="e.g. Salesforce, Notion, Linear…"
                value={company} onChange={e => setCompany(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && !isRunning && !isDone && onSubmit()}
                disabled={isRunning || isDone}
              />
            </div>
            <div className="field">
              <label className="field-label">Research Context <span className="optional">optional</span></label>
              <textarea
                className="field-textarea" rows={3}
                placeholder="Describe your use case, target market, or specific angles to investigate…"
                value={context} onChange={e => setContext(e.target.value)}
                disabled={isRunning || isDone}
              />
            </div>
          </div>
          <div>
            {isDone ? (
              <button className="btn btn-reset" onClick={onReset}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                  <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
                </svg>
                New Analysis
              </button>
            ) : (
              <button
                className={`btn btn-primary${isRunning ? ' btn-loading' : ''}`}
                onClick={onSubmit} disabled={isRunning || !company.trim()}
              >
                {isRunning ? (
                  <><span className="btn-spinner"/>Analyzing…</>
                ) : (
                  <>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Run Analysis
                  </>
                )}
              </button>
            )}
          </div>
        </div>
      );
    }

    /* ── Progress Tracker ─────────────────────────────────────────────────── */
    function ProgressTracker({ steps, stepStates }) {
      const completed = stepStates.filter(s => s === 'complete').length;
      const allDone   = completed === steps.length;
      return (
        <div className="progress-tracker">
          <div className="tracker-header">
            <span className="tracker-label">Analysis Pipeline</span>
            <span className={`tracker-count${allDone ? ' all-done' : ''}`}>{completed}/{steps.length}</span>
          </div>
          <div className="tracker-steps">
            {steps.map((step, i) => (
              <StepItem key={step.id} step={step} state={stepStates[i]} isLast={i === steps.length - 1} />
            ))}
          </div>
        </div>
      );
    }

    function StepItem({ step, state, isLast }) {
      return (
        <div className={`step-item step-${state}`}>
          <div className="step-left">
            <div className="step-circle">
              {state === 'complete' && (
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
              )}
              {state === 'active' && <div className="step-spinner"/>}
              {state === 'idle'   && <span className="step-number">{step.id + 1}</span>}
              {state === 'active' && <div className="step-pulse-ring"/>}
            </div>
            {!isLast && <div className="step-connector"/>}
          </div>
          <div className="step-content">
            <div className="step-label">{step.label}</div>
            <div className="step-desc">{step.desc}</div>
          </div>
        </div>
      );
    }

    /* ── Output Panel ─────────────────────────────────────────────────────── */
    function OutputPanel({ phase, company, activeStep }) {
      if (phase === 'idle') return (
        <div className="output-panel output-idle">
          <div className="idle-inner">
            <div className="idle-icon-wrap">
              <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
            </div>
            <h3 className="idle-title">Ready to Research</h3>
            <p className="idle-body">Enter a company name and run your first competitive analysis. Results will appear here.</p>
            <div className="idle-chips">
              {['Competitor discovery','Market positioning','Strategic insights'].map(l => (
                <span key={l} className="idle-chip"><span className="idle-chip-dot"/>{l}</span>
              ))}
            </div>
          </div>
        </div>
      );

      if (phase === 'running') return (
        <div className="output-panel output-running">
          <div>
            <div className="running-eyebrow">Analyzing</div>
            <div className="running-company">{company}</div>
            <div className="running-status-row">
              <span className="running-dot"/>
              <span>{activeStep ? `${activeStep.label}…` : 'Finalizing…'}</span>
            </div>
          </div>
          <div className="skeleton-stack">
            {[0,1,2].map(i => (
              <div key={i} className="skeleton-card">
                <div className="skel skel-w70" style={{animationDelay:`${i*.12}s`}}/>
                <div className="skel skel-w50" style={{animationDelay:`${i*.12+.1}s`}}/>
                <div className="skel skel-w35" style={{animationDelay:`${i*.12+.2}s`}}/>
              </div>
            ))}
          </div>
        </div>
      );

      const today = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      return (
        <div className="output-panel output-done">
          <div className="report-header">
            <div className="report-title-row">
              <div>
                <div className="report-eyebrow">Competitive Analysis Report</div>
                <h2 className="report-company">{company}</h2>
              </div>
              <div className="report-meta-col">
                <span className="report-badge">Complete</span>
                <span className="report-date">{today}</span>
              </div>
            </div>
            <div className="report-stats">
              {[['5','Competitors'],['847','Data Points'],['12','Insights'],['94%','Coverage']].map(([v,l]) => (
                <div key={l} className="stat">
                  <span className="stat-value">{v}</span>
                  <span className="stat-label">{l}</span>
                </div>
              ))}
            </div>
          </div>

          <div className="report-body">
            <section>
              <h3 className="report-section-title">Competitors Identified</h3>
              <div className="competitors-grid">
                {MOCK_COMPETITORS.map((c,i) => {
                  const tc = {High:'threat-high',Medium:'threat-medium',Low:'threat-low'}[c.threat];
                  return (
                    <div key={c.name} className="competitor-card" style={{animationDelay:`${i*70}ms`}}>
                      <div className="cc-top">
                        <div className="cc-avatar">{c.name[0]}</div>
                        <span className={`cc-threat ${tc}`}>{c.threat}</span>
                      </div>
                      <div className="cc-name">{c.name}</div>
                      <div className="cc-founded">Est. {c.founded}</div>
                      <div className="cc-tags">{c.tags.map(t=><span key={t} className="cc-tag">{t}</span>)}</div>
                    </div>
                  );
                })}
              </div>
            </section>

            <section>
              <h3 className="report-section-title">Key Market Insights</h3>
              <div className="insights-list">
                {MOCK_INSIGHTS.map((text,i) => (
                  <div key={i} className="insight-item" style={{animationDelay:`${i*90+120}ms`}}>
                    <span className="insight-bullet"/>
                    <p className="insight-text">{text}</p>
                  </div>
                ))}
              </div>
            </section>

            <section>
              <h3 className="report-section-title">Strategic Recommendations</h3>
              <div className="recs-grid">
                {MOCK_RECS.map((r,i) => (
                  <div key={r.title} className="rec-card" style={{animationDelay:`${i*90+300}ms`}}>
                    <div className="rec-number">0{i+1}</div>
                    <div className="rec-title">{r.title}</div>
                    <div className="rec-body">{r.body}</div>
                  </div>
                ))}
              </div>
            </section>
          </div>
        </div>
      );
    }

    /* ── Mount ────────────────────────────────────────────────────────────── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
